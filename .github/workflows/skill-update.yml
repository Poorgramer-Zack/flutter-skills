name: Weekly Skill Update

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-skills:
    runs-on: ubuntu-latest

    steps:
      # Use GITHUB_TOKEN for checkout so git push works without a PAT
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Scan skills, update dependencies, and create PR
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          BRANCH="skill-update/$TODAY"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          copilot -p "You are maintaining a Flutter/Dart skills library. Each skill lives in skills/<name>/SKILL.md.

          SKILL AUTHORING STANDARDS (read .github/instructions/skills.instructions.md for full rules):
          - SKILL.md frontmatter: name (gerund form, lowercase-hyphenated, max 64 chars), description (third-person, max 1024 chars, includes discovery triggers), metadata.last_modified.
          - Keep body under 500 lines. Split large content to references/ files.
          - All reference links must be one level deep from SKILL.md.
          - Use consistent terminology throughout each file.
          - For MAJOR bumps: move old patterns to an 'Old Patterns' section instead of deleting.
          - Never over-explain things Claude already knows.

          Your job:
          1. Scan every skills/*/SKILL.md file.
          2. Extract all pub.dev package names and their currently pinned versions from pubspec.yaml code blocks inside each file.
          3. For each package, fetch its latest stable version and CHANGELOG by running:
             curl -s https://pub.dev/api/packages/{package_name}
             The response JSON contains .latest.version for the latest version.
             Also fetch https://pub.dev/packages/{package_name}/changelog to read breaking changes and new features.
          4. Compare versions:
             - MAJOR bump (breaking change): update version pins in SKILL.md, revise code examples and description if APIs changed, move old patterns to 'Old Patterns' section, update metadata.last_modified.
             - MINOR bump (new feature): update version pins in SKILL.md, update metadata.last_modified.
             - PATCH only: skip.
          5. For every SKILL.md that changed, prepend a new dated entry to CHANGELOG.md at the repo root (the file already exists).

          CHANGELOG.md entry format:
          ## [$TODAY]
          - **<skill-name>**: Updated <package> <old_version> to <new_version> - <one-line summary>

          6. After all file updates, check if any SKILL.md or CHANGELOG.md actually changed:
             git diff --quiet -- \$(find skills -name 'SKILL.md') CHANGELOG.md
             If nothing changed, print 'No updates needed.' and stop.
          7. If there are changes, commit and open a PR:
             git checkout -b $BRANCH
             git add -- \$(find skills -name 'SKILL.md') CHANGELOG.md
             git commit -m 'chore: weekly skill dependency update $TODAY

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>'
             git push origin $BRANCH
             gh pr create --title 'chore: weekly skill dependency update $TODAY' --body 'Automated weekly scan of Flutter/Dart package dependencies. See CHANGELOG.md for details.' --base main --head $BRANCH

          Rules:
          - Only write files that actually changed (SKILL.md and CHANGELOG.md only — no temp files).
          - Keep all existing SKILL.md content and structure intact.
          - Do not invent version numbers; use only what pub.dev returns.
          - Follow all standards in .github/instructions/skills.instructions.md." \
            --model claude-sonnet-4.6 \
            --allow-tool='*' \
            --no-ask-user \
            -s
